name: Deploy Game to GitHub Pages

on:
  # Ana dala (main veya master) her push yapıldığında çalışır
  push:
    branches: ["main"] 

  # GitHub üzerinden manuel olarak da tetiklenebilmesini sağlar
  workflow_dispatch:

# GitHub Pages'e yükleme yapabilmek için gerekli izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda birden fazla deploy yapılmasını engeller, sıraya koyar
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Oyun dosyanızın olduğu klasör. 
          # Eğer dosyalar direkt ana dizindeyse '.' olarak bırakın.
          # Bir klasörün içindeyse 'klasor-adi' yazın.
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
